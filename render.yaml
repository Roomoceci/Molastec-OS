services:
  - type: web
    name: molatec-os
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    autoDeployTrigger: commit
    disk:
      name: molatec-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: DB_PATH
        value: /var/data/molatech.db
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_NAME
        value: Administrador
      - key: AUTH_TOKEN_SECRET
        sync: false
      - key: SEED_DEMO_DATA
        value: false
      - key: WHATSAPP_CENTRAL_NUMBER
        sync: false
      - key: WHATSAPP_CENTRAL_NAME
        value: Central MolaTech
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: 587
      - key: SMTP_SECURE
        value: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
