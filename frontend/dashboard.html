<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard | MolaTech OS</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="dashboard-page">
    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">🔧</div>
        <div class="sidebar-brand">
          <h3>MolaTech</h3>
          <small>v1.0</small>
        </div>
      </div>
      <nav class="sidebar-nav">
        <a href="dashboard.html" class="active">📊 Dashboard</a>
        <a href="clientes.html">👥 Clientes</a>
        <a href="ordens.html">📋 Ordens</a>
        <a href="solicitacoes.html">🚀 Solicitações</a>
        <a href="tecnicos.html">🔩 Técnicos</a>
        <a href="financeiro.html">💰 Financeiro</a>
        <button id="sidebarLogout">🚪 Sair</button>
      </nav>
    </aside>

    <!-- MAIN CONTENT -->
    <div class="main-wrapper">
      <header class="topbar">
        <div>
          <h1>Dashboard Administrativo</h1>
          <p id="userName">Bem-vindo!</p>
        </div>
        <div class="topbar-actions">
          <button class="theme-toggle" id="themeToggle">🌙</button>
          <button id="logoutButton" class="button-secondary">Sair</button>
        </div>
      </header>

      <main class="container">
        <section class="grid-cards">
          <div class="card">
            <div class="card-icon primary">📋</div>
            <span>Ordens Abertas</span>
            <strong id="ordersOpen">0</strong>
          </div>
          <div class="card">
            <div class="card-icon success">✓</div>
            <span>Ordens Concluídas</span>
            <strong id="ordersClosed">0</strong>
          </div>
          <div class="card">
            <div class="card-icon warning">💰</div>
            <span>Faturamento Pago</span>
            <strong id="revenue">R$ 0,00</strong>
          </div>
          <div class="card">
            <div class="card-icon primary">👥</div>
            <span>Clientes Ativos</span>
            <strong id="activeClients">0</strong>
          </div>
        </section>

        <section class="panel">
          <div class="panel-header">
            <h2>Últimas Ordens</h2>
            <button id="refreshDashboard" class="button-tertiary">🔄 Atualizar</button>
          </div>
          <div class="table-container">
            <table>
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Cliente</th>
                  <th>Status</th>
                  <th>Valor</th>
                </tr>
              </thead>
              <tbody id="ordersSummary"></tbody>
            </table>
          </div>
        </section>
      </main>
    </div>
  </div>

  <!-- TOAST NOTIFICATION -->
  <div id="toast" class="toast" style="display: none;"></div>

  <!-- Scripts -->
  <script src="js/ApiService.js"></script>
  <script src="js/AuthManager.js"></script>
  <script src="js/ToastManager.js"></script>
  <script src="js/UIManager.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
