<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clientes | MolaTech OS</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="dashboard-page">
    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">🔧</div>
        <div class="sidebar-brand">
          <h3>MolaTech</h3>
          <small>v1.0</small>
        </div>
      </div>
      <nav class="sidebar-nav">
        <a href="dashboard.html">📊 Dashboard</a>
        <a href="clientes.html" class="active">👥 Clientes</a>
        <a href="ordens.html">📋 Ordens</a>
        <a href="solicitacoes.html">🚀 Solicitações</a>
        <a href="tecnicos.html">🔩 Técnicos</a>
        <a href="financeiro.html">💰 Financeiro</a>
        <button id="sidebarLogout">🚪 Sair</button>
      </nav>
    </aside>

    <!-- MAIN CONTENT -->
    <div class="main-wrapper">
      <header class="topbar">
        <div>
          <h1>Gestão de Clientes</h1>
          <p>Cadastro e histórico de atendimentos</p>
        </div>
        <div class="topbar-actions">
          <button class="theme-toggle" id="themeToggle">🌙</button>
          <button id="logoutButton" class="button-secondary">Sair</button>
        </div>
      </header>

      <main class="container">
        <section class="split-panel">
          <form id="clientForm" class="panel form-card">
            <h2>Novo Cliente</h2>
            <label>Nome<input type="text" id="clientName" required /></label>
            <label>Telefone<input type="text" id="clientPhone" /></label>
            <label>E-mail<input type="email" id="clientEmail" /></label>
            <label>Endereço<input type="text" id="clientAddress" /></label>
            <label>Observações<textarea id="clientNotes"></textarea></label>
            <button type="submit" class="button-primary">Cadastrar cliente</button>
            <p id="clientFeedback" class="success-message"></p>
          </form>

          <div class="panel">
            <div class="panel-header">
              <h2>Lista de Clientes</h2>
              <button id="refreshClients" class="button-tertiary">🔄 Atualizar</button>
            </div>
            <div class="table-container">
              <table>
                <thead><tr><th>Nome</th><th>Telefone</th><th>E-mail</th><th>Endereço</th></tr></thead>
                <tbody id="clientsTable"></tbody>
              </table>
            </div>
          </div>
        </section>
      </main>
    </div>
  </div>

  <!-- TOAST NOTIFICATION -->
  <div id="toast" class="toast" style="display: none;"></div>

  <!-- Scripts -->
  <script src="js/ApiService.js"></script>
  <script src="js/AuthManager.js"></script>
  <script src="js/ToastManager.js"></script>
  <script src="js/UIManager.js"></script>
  <script src="js/clientes.js"></script>
</body>
</html>
