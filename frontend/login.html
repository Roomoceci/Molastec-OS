<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | MolaTech OS</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="brand">
        <div class="brand-logo">🔧</div>
        <h1>MolaTech OS</h1>
        <p>Gestão Inteligente de Ordens de Serviço</p>
      </div>
      <form id="loginForm" class="form-card">
        <h2>Entrar na plataforma</h2>
        <label>
          E-mail
          <input type="email" id="email" placeholder="admin@molatech.com" required />
        </label>
        <label>
          Senha
          <input type="password" id="password" placeholder="admin123" required />
        </label>
        <button type="submit" class="button-primary">Acessar painel</button>
        <p class="small-text">Usuário de teste: admin@molatech.com / admin123</p>
        <p id="errorMessage" class="error-message"></p>
      </form>
    </div>
  </div>
  <!-- Scripts -->
  <script src="js/ApiService.js"></script>
  <script src="js/AuthManager.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
